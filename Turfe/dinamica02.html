<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="botaoIniciar" style="display: none;">
    <button onclick="iniciar()">Iniciar</button>
  </div>

  <div style="display: none;">
    <label>Selecione a quantidade de cavalos</label>
    <select id="select_qtdCavalo">
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
      <option>6</option>
    </select>
    <input type="text" id="ipt_nomeC" placeholder="Insira o nome de um cavalo" />
    <button onclick="adicionar()">Adicionar Cavalo</button>
    <button onclick="voltas()">Ver voltas</button>
    <div id="div_mensagem"></div>
  </div>
</body>

</html>
<script>

  function iniciar() {
    botaoIniciar.style.display = "none"
    body = ``
  }

  let mensagem = "";

  let listaCavalos = [];

  function adicionar() {
    let qtdCavalos = Number(select_qtdCavalo.value);
    let nomeCavalo = ipt_nomeC.value;
    if (listaCavalos.length >= qtdCavalos) {
      alert("Quantida máxima atingida");
      return;
    } else {
      listaCavalos.push({
        nome: nomeCavalo,
        tempo: 0,
        tempoTotal: 0,
      });
    }
  }

  function voltas() {
    let voltas = 0;

    for (let i = 0; i < 7; i++) {
      voltas++;

      mensagem += `Volta ${voltas} <br>`
      for (let y = 0; y < listaCavalos.length; y++) {
        let cavalo = listaCavalos[y];
        let tempo = tempoVolta();
        cavalo.tempo = tempo;
        cavalo.tempoTotal += Number(tempo);

        mensagem += `
    ${cavalo.nome} – ${cavalo.tempo} – ${cavalo.tempoTotal.toFixed(1)} <br>
    `;
      }
    }
    let lista = listaCavalos[0]

    let p1 = listaCavalos[0];
    let p2 = null;
    let p3 = null;

    for (let i = 1; i < listaCavalos.length; i++) {
      let atual = listaCavalos[i];

      if (atual.tempoTotal < p1.tempoTotal) {
        p3 = p2;
        p2 = p1;
        p1 = atual;
      }
      else if (p2 == null || atual.tempoTotal < p2.tempoTotal) {
        p3 = p2;
        p2 = atual;
      }
      else if (p3 == null || atual.tempoTotal < p3.tempoTotal) {
        p3 = atual;
      }
    }
    mensagem += `
    P1: ${p1.nome} - Tempo: ${p1.tempoTotal.toFixed(1)}<br>
    P2: ${p2.nome} - Tempo: ${p2.tempoTotal.toFixed(1)}<br>
    P3: ${p3.nome} - Tempo: ${p3.tempoTotal.toFixed(1)}<br>`

    div_mensagem.innerHTML = mensagem;
  }

  function tempoVolta() {
    let numeroAleatorio = (Math.random() * 2 + 7).toFixed(1);
    return numeroAleatorio;
  }
</script>
